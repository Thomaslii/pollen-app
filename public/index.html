<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Pollen App Übersicht</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f9f9f9; }
    h1 { text-align: center; }
    #locationList { margin-bottom: 20px; list-style: none; padding: 0; display: flex; flex-wrap: wrap; gap: 10px; }
    #locationList button { padding: 10px 15px; border: none; background: #4CAF50; color: white; cursor: pointer; border-radius: 5px; }
    #locationList button:hover { background: #45a049; }

    #legend { margin-bottom: 20px; }
    .legend-item { display: inline-block; margin-right: 20px; font-weight: bold; }
    .green { color: #2ecc71; }
    .yellow { color: #f1c40f; }
    .orange { color: #e67e22; }
    .red { color: #e74c3c; }

    #pollenList { list-style: none; padding: 0; }
    #pollenList li { padding: 5px 10px; margin-bottom: 3px; border-radius: 4px; background: white; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
  <h1>🌿 Pollenübersicht</h1>

  <!-- Standort-Auswahl -->
  <ul id="locationList"></ul>

  <!-- Legende -->
  <div id="legend">
    <span class="legend-item green">🟢 0 – niedrig</span>
    <span class="legend-item yellow">🟡 1–50 – mäßig</span>
    <span class="legend-item orange">🟠 51–200 – hoch</span>
    <span class="legend-item red">🔴 >200 – sehr hoch</span>
  </div>

  <!-- Pollendaten -->
  <ul id="pollenList"></ul>

  <script>
    const pollenNames = {
      Abies: "Tanne",
      Acer: "Ahorn",
      Aesculus: "Rosskastanie",
      Alnus: "Erle",
      Ambrosia: "Ambrosie",
      Artemisia: "Beifuß",
      Asteraceae: "Korbblütler",
      Betula: "Birke",
      Carpinus: "Hainbuche",
      Castanea: "Kastanie",
      Chenopodium: "Gänsefußgewächse",
      Corylus: "Hasel",
      Cruciferae: "Kreuzblütler",
      Cyperaceae: "Sauergrasgewächse",
      Erica: "Heidekraut",
      Fagus: "Buche",
      Fraxinus: "Esche",
      Fungus: "Pilze",
      Galium: "Labkraut",
      Humulus: "Hopfen",
      Impatiens: "Springkraut",
      Juglans: "Walnuss",
      Larix: "Lärche",
      Picea: "Fichte",
      Pinaceae: "Kieferngewächse",
      Pinus: "Kiefer",
      Plantago: "Wegerich",
      Platanus: "Platane",
      Poaceae: "Süßgräser",
      Populus: "Pappel",
      Quercus: "Eiche",
      "Quercus ilex": "Steineiche",
      Rumex: "Ampfer",
      Salix: "Weide",
      Sambucus: "Holunder",
      Secale: "Roggen",
      Taxus: "Eibe",
      Tilia: "Linde",
      Ulmus: "Ulme",
      Urtica: "Brennnessel",
      Varia: "Verschiedenes"
    };

    function getColorSymbol(value) {
      if (value === 0) return "🟢";
      if (value <= 50) return "🟡";
      if (value <= 200) return "🟠";
      return "🔴";
    }

    async function loadMeasurements(locationId) {
      const res = await fetch(`/api/measurements?locations=${locationId}`);
      const measurements = await res.json();

      const list = document.getElementById("pollenList");
      list.innerHTML = "";

      // Gruppiere nach Pollenart
      const pollenMap = {};
      measurements.forEach(m => {
        if (!m.data || m.data.length === 0) return;
        if (!pollenMap[m.polle]) pollenMap[m.polle] = [];
        pollenMap[m.polle].push(...m.data);
      });

      // Für jede Pollenart sortieren nach timestamp absteigend (aktuellster zuerst)
      Object.entries(pollenMap).forEach(([polle, dataArray]) => {
        const sorted = dataArray.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
        sorted.forEach(d => {
          const symbol = getColorSymbol(d.value);
          const dateStr = new Date(d.timestamp).toLocaleString();
          const li = document.createElement("li");
          li.textContent = `${symbol} ${pollenNames[polle] || polle}: ${d.value.toFixed(1)} – ${dateStr}`;
          list.appendChild(li);
        });
      });
    }

    async function loadLocations() {
      const res = await fetch("/api/locations");
      const locations = await res.json();
      const list = document.getElementById("locationList");
      list.innerHTML = "";
      locations.forEach(l => {
        const li = document.createElement("li");
        const btn = document.createElement("button");
        btn.textContent = `${l.name} (${l.id})`;
        btn.onclick = () => loadMeasurements(l.id);
        li.appendChild(btn);
        list.appendChild(li);
      });
    }

    loadLocations();
  </script>
</body>
</html>
