<!DOCTYPE html>
<html>
<head>
  <title>Pollen Dashboard Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: sans-serif; margin: 10px; }
    select, button { padding: 5px 10px; margin: 5px 0; }
    table { border-collapse: collapse; margin-top: 10px; width: 100%; max-width: 600px; }
    th, td { border: 1px solid #ccc; padding: 5px 10px; text-align: center; }
    .green { background-color: #4CAF50; color: white; }
    .yellow { background-color: #FFEB3B; }
    .red { background-color: #F44336; color: white; }
    canvas { margin-top: 20px; max-width: 100%; height: auto; }
    @media (max-width: 600px) {
      table, canvas { width: 100%; }
    }
  </style>
</head>
<body>
  <h1>🌿 Pollen Dashboard Pro</h1>

  <label for="locationSelect">Standort auswählen:</label>
  <select id="locationSelect"></select>
  <button onclick="loadMeasurementsByLocation()">Anzeigen</button>

  <table id="measurementTable">
    <tr>
      <th>Pollen</th>
      <th>Wert (Pollen/m³)</th>
      <th>Ampel</th>
    </tr>
  </table>

  <h2>Balkendiagramm (letzte 7 Tage)</h2>
  <canvas id="pollenChart" width="600" height="300"></canvas>

  <script>
    let pollenChart;
    let favoriteLocation = localStorage.getItem("favoriteLocation") || null;

    async function loadLocations() {
      const res = await fetch("/api/locations");
      const data = await res.json();
      const select = document.getElementById("locationSelect");
      select.innerHTML = ""; // vorher löschen
      data.forEach(loc => {
        const option = document.createElement("option");
        option.value = loc.id;
        option.textContent = loc.name;
        if (favoriteLocation === loc.id) option.selected = true;
        select.appendChild(option);
      });
      if (!favoriteLocation && data.length > 0) favoriteLocation = data[0].id;
    }

    async function loadMeasurementsByLocation() {
      const locationId = document.getElementById("locationSelect").value;
      localStorage.setItem("favoriteLocation", locationId);

      const res = await fetch("/api/measurements");
      const data = await res.json();

      const filtered = data.filter(m => m.location === locationId);

      // Tabelle zurücksetzen
      const table = document.getElementById("measurementTable");
      table.innerHTML = `
        <tr>
          <th>Pollen</th>
          <th>Wert (Pollen/m³)</th>
          <th>Ampel</th>
        </tr>
      `;

      const labels = [];
      const values = [];
      const colors = [];

      filtered.forEach(m => {
        let colorClass = "green";
        let color = "#4CAF50";
        if (m.value > 20) { colorClass = "red"; color = "#F44336"; }
        else if (m.value > 10) { colorClass = "yellow"; color = "#FFEB3B"; }

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${m.pollen}</td>
          <td>${m.value}</td>
          <td class="${colorClass}">&nbsp;&nbsp;&nbsp;</td>
        `;
        table.appendChild(tr);

        labels.push(m.pollen);
        values.push(m.value);
        colors.push(color);
      });

      const ctx = document.getElementById("pollenChart").getContext("2d");
      if (pollenChart) pollenChart.destroy();

      pollenChart = new Chart(ctx, {
        type: 'bar',
        data: { labels, datasets: [{ label: 'Pollenkonzentration', data: values, backgroundColor: colors }] },
        options: {
          responsive: true,
          plugins: { tooltip: { enabled: true } },
          scales: { y: { beginAtZero: true, title: { display: true, text: 'Pollen pro m³' } } }
        }
      });
    }

    // Auto-Refresh alle 10 Minuten
    setInterval(() => loadMeasurementsByLocation(), 10 * 60 * 1000);

    // initial laden
    loadLocations().then(loadMeasurementsByLocation);
  </script>
</body>
</html>
