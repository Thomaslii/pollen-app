<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Pollen App Interaktiv</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    h1 { margin-bottom: 10px; }
    select, button { margin: 5px 0; }
    ul { list-style: none; padding-left: 0; }
    li { margin: 3px 0; }
  </style>
</head>
<body>
  <h1>🌿 Meine Pollen App</h1>

  <label for="locationSelect">Standort wählen:</label>
  <select id="locationSelect"></select>
  <button onclick="loadPollen()">Pollenwerte laden</button>

  <h2>Pollenwerte</h2>
  <ul id="pollenList"></ul>

  <script>
    const pollenNames = {
      "Abies": "Tanne",
      "Acer": "Ahorn",
      "Aesculus": "Rosskastanie",
      "Alnus": "Erle",
      "Ambrosia": "Ambrosie",
      "Artemisia": "Beifuß",
      "Asteraceae": "Korbblütler",
      "Betula": "Birke",
      "Carpinus": "Hainbuche",
      "Castanea": "Kastanie",
      "Chenopodium": "Gänsefußgewächse",
      "Corylus": "Hasel",
      "Cruciferae": "Kreuzblütler",
      "Cyperaceae": "Sauergrasgewächse",
      "Erica": "Heidekraut",
      "Fagus": "Buche",
      "Fraxinus": "Esche",
      "Fungus": "Pilze",
      "Galium": "Labkraut",
      "Humulus": "Hopfen",
      "Impatiens": "Springkraut",
      "Juglans": "Walnuss",
      "Larix": "Lärche",
      "Picea": "Fichte",
      "Pinaceae": "Kieferngewächse",
      "Pinus": "Kiefer",
      "Plantago": "Wegerich",
      "Platanus": "Platane",
      "Poaceae": "Süßgräser",
      "Populus": "Pappel",
      "Quercus": "Eiche",
      "Quercus ilex": "Steineiche",
      "Rumex": "Ampfer",
      "Salix": "Weide",
      "Sambucus": "Holunder",
      "Secale": "Roggen",
      "Taxus": "Eibe",
      "Tilia": "Linde",
      "Ulmus": "Ulme",
      "Urtica": "Brennnessel",
      "Varia": "Verschiedenes"
    };

    function getColorSymbol(value) {
      if (value === 0) return "🟢";
      if (value < 50) return "🟡";
      if (value < 200) return "🟠";
      return "🔴";
    }

    async function loadLocations() {
      const res = await fetch("/api/locations");
      const locations = await res.json();
      const select = document.getElementById("locationSelect");
      select.innerHTML = "";
      locations.forEach(l => {
        const option = document.createElement("option");
        option.value = l.id;
        option.textContent = l.name;
        select.appendChild(option);
      });
    }

    async function loadPollen() {
      const loc = document.getElementById("locationSelect").value;
      if (!loc) return alert("Bitte einen Standort auswählen!");

      const res = await fetch(`/api/measurements?location=${loc}`);
      const data = await res.json();

      const list = document.getElementById("pollenList");
      list.innerHTML = "";

      // Daten pro Pollenart sammeln
      const grouped = {};
      data.forEach(d => {
        if (!grouped[d.pollen]) grouped[d.pollen] = [];
        grouped[d.pollen].push({ value: d.value, timestamp: d.timestamp });
      });

      // Sortieren nach aktuellstem Timestamp
      for (const polle in grouped) {
        grouped[polle].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
      }

      // Liste ausgeben
      for (const polle in grouped) {
        const sorted = grouped[polle];
        sorted.forEach(d => {
          const symbol = getColorSymbol(d.value);
          const dt = new Date(d.timestamp);
          const dateStr = isNaN(dt) ? "kein Datum" : dt.toLocaleString();
          const li = document.createElement("li");
          li.textContent = `${symbol} ${pollenNames[polle] || polle}: ${d.value.toFixed(1)} – ${dateStr}`;
          list.appendChild(li);
        });
      }
    }

    // Direkt beim Laden die Standorte abrufen
    loadLocations();
  </script>
</body>
</html>
