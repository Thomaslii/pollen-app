<!DOCTYPE html>
<html>
<head>
  <title>Pollen App</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <style>
    #map { height: 300px; margin-bottom: 20px; }
    .pollen-list li { margin: 4px 0; }
  </style>
</head>
<body>
  <h1>🌿 Meine Pollen App</h1>

  <!-- Standort auswählen -->
  <select id="locationSelect" onchange="loadMeasurements7Days(this.value)"></select>

  <!-- Karte -->
  <div id="map"></div>

  <!-- Balkendiagramm -->
  <canvas id="pollenChart" width="600" height="300"></canvas>

  <!-- Pollenliste mit Ampel -->
  <ul id="pollenList" class="pollen-list"></ul>

  <script>
    let locations = [];
    let chart;

    async function initApp() {
      await loadLocations();
      await loadPollen();
      initMap();
      if (locations.length) loadMeasurements7Days(locations[0].id);
      if(Notification.permission !== "granted") Notification.requestPermission();
    }

    async function loadPollen() {
      const res = await fetch("/api/pollen");
      const data = await res.json();
      const filter = document.getElementById("pollenFilter");
      if(filter) {
        data.forEach(p => {
          const opt = document.createElement("option");
          opt.value = p;
          opt.textContent = p;
          filter.appendChild(opt);
        });
      }
    }

    async function loadLocations() {
      const res = await fetch("/api/locations");
      locations = await res.json();
      const select = document.getElementById("locationSelect");
      select.innerHTML = "";
      locations.forEach(l => {
        const opt = document.createElement("option");
        opt.value = l.id;
        opt.textContent = l.name;
        select.appendChild(opt);
      });
    }

    function initMap() {
      const map = L.map('map').setView([48.23, 11.2], 8);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
      locations.forEach(l => {
        const marker = L.marker([l.lat, l.lon]).addTo(map);
        marker.bindPopup(`<b>${l.name}</b>`).on('click', () => loadMeasurements7Days(l.id));
      });
    }

    function getColor(value) {
      if(value<=10) return 'green';
      if(value<=30) return 'lightgreen';
      if(value<=60) return 'yellow';
      if(value<=90) return 'orange';
      return 'red';
    }

    async function loadMeasurements7Days(locationId) {
      const res = await fetch(`/api/measurements?locations=${locationId}`);
      const measurements = await res.json();

      const labels = [];
      const datasetsMap = {};

      measurements.forEach(m => {
        if(!datasetsMap[m.polle]) datasetsMap[m.polle] = [];
        m.data.forEach(d => {
          const date = new Date(d.from*1000).toLocaleDateString();
          if(!labels.includes(date)) labels.push(date);
          datasetsMap[m.polle].push(d.value);

          if(d.value>90 && Notification.permission === "granted") {
            new Notification(`${m.polle} in ${locationId} hoch!`, { body: `Wert: ${d.value}` });
          }
        });
      });

      const datasets = Object.keys(datasetsMap).map(polle => ({
        label: polle,
        data: datasetsMap[polle],
        backgroundColor: datasetsMap[polle].map(v => getColor(v))
      }));

      const ctx = document.getElementById("pollenChart").getContext("2d");
      if(chart) chart.destroy();
      chart = new Chart(ctx, {
        type: "bar",
        data: { labels, datasets },
        options: { responsive: true, plugins: { legend: { position: 'top' } } }
      });

      // Pollenliste Ampel
      const list = document.getElementById("pollenList");
      list.innerHTML = "";
      Object.keys(datasetsMap).forEach(polle => {
        const li = document.createElement("li");
        const lastValue = datasetsMap[polle][datasetsMap[polle].length-1];
        li.textContent = `${polle}: ${lastValue}`;
        li.style.color = getColor(lastValue);
        list.appendChild(li);
      });
    }

    initApp();
  </script>
</body>
</html>
