<!DOCTYPE html>
<html>
<head>
  <title>Thomas' Pollen Übersicht</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body { font-family: Arial, sans-serif; margin: 10px; }
    h1 { margin-bottom: 10px; }
    #legend { margin-bottom: 10px; }
    #map { height: 500px; width: 100%; margin-top: 20px; }
    select { margin-bottom: 10px; padding: 5px; font-size: 16px; }
    ul { list-style: none; padding: 0; }
    li { margin: 2px 0; font-size: 14px; }
    .legend-item { display: inline-block; margin-right: 10px; font-size: 14px; }
  </style>
</head>
<body>
  <h1>🌿 Pollen Ampel Übersicht & Map</h1>

  <!-- Legende -->
  <div id="legend">
    <span class="legend-item">🟢 0–10 Sehr niedrig</span>
    <span class="legend-item">🟡 11–50 Niedrig</span>
    <span class="legend-item">🟠 51–200 Mittel</span>
    <span class="legend-item">🔴 201–500 Hoch</span>
    <span class="legend-item">🛑 >500 Sehr hoch</span>
  </div>

  <!-- Standortauswahl -->
  <select id="locationSelect" onchange="highlightLocation(this.value)"></select>

  <!-- Ampelliste -->
  <ul id="pollenList"></ul>

  <!-- Karte -->
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    let map = L.map('map').setView([48.5, 11.5], 7); // mittig auf Bayern
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    let locations = [];
    let markers = [];

    const pollenNames = {
      "Abies": "Tanne","Acer": "Ahorn","Aesculus": "Rosskastanie",
      "Alnus": "Erle","Ambrosia": "Ambrosie","Artemisia": "Beifuß",
      "Asteraceae": "Korbblütler","Betula": "Birke","Carpinus": "Hainbuche",
      "Castanea": "Kastanie","Chenopodium": "Gänsefußgewächse","Corylus": "Hasel",
      "Cruciferae": "Kreuzblütler","Cyperaceae": "Sauergrasgewächse","Erica": "Heidekraut",
      "Fagus": "Buche","Fraxinus": "Esche","Fungus": "Pilze","Galium": "Labkraut",
      "Humulus": "Hopfen","Impatiens": "Springkraut","Juglans": "Walnuss",
      "Larix": "Lärche","Picea": "Fichte","Pinaceae": "Kieferngewächse",
      "Pinus": "Kiefer","Plantago": "Wegerich","Platanus": "Platane",
      "Poaceae": "Süßgräser","Populus": "Pappel","Quercus": "Eiche",
      "Quercus ilex": "Steineiche","Rumex": "Ampfer","Salix": "Weide",
      "Sambucus": "Holunder","Secale": "Roggen","Taxus": "Eibe",
      "Tilia": "Linde","Ulmus": "Ulme","Urtica": "Brennnessel",
      "Varia": "Verschiedenes"
    };

    function getColorSymbol(value) {
      if(value <= 10) return '🟢';
      if(value <= 50) return '🟡';
      if(value <= 200) return '🟠';
      if(value <= 500) return '🔴';
      return '🛑';
    }

    function getMarkerColor(value) {
      if(value <= 10) return 'green';
      if(value <= 50) return 'yellow';
      if(value <= 200) return 'orange';
      if(value <= 500) return 'red';
      return 'darkred';
    }

    async function initApp() {
      await loadLocations();
      populateSelect();
      await loadMeasurements(locations[0].id); // initialer Standort
      await loadMarkers();
    }

    async function loadLocations() {
      const res = await fetch("/api/locations");
      locations = await res.json();
    }

    function populateSelect() {
      const select = document.getElementById("locationSelect");
      select.innerHTML = "";
      locations.forEach(l => {
        const opt = document.createElement("option");
        opt.value = l.id;
        opt.textContent = l.name;
        select.appendChild(opt);
      });
    }

    async function loadMeasurements(locationId) {
      const res = await fetch(`/api/measurements?locations=${locationId}`);
      const measurements = await res.json();

      const list = document.getElementById("pollenList");
      list.innerHTML = "";

      // Nur **letzter Wert pro Pollenart**
      measurements.forEach(m => {
        if(!m.data || m.data.length === 0) return;
        const lastEntry = m.data[m.data.length - 1];
        const lastVal = lastEntry.value || 0;

        const symbol = getColorSymbol(lastVal);
        const li = document.createElement("li");
        li.textContent = `${symbol} ${pollenNames[m.polle] || m.polle} (${m.polle}): ${lastVal.toFixed(1)}`;
        list.appendChild(li);
      });
    }

    async function loadMarkers() {
      for(const loc of locations){
        const res = await fetch(`/api/measurements?locations=${loc.id}`);
        const measurements = await res.json();

        let maxVal = 0;
        measurements.forEach(m => {
          if(!m.data || m.data.length === 0) return;
          const lastVal = m.data[m.data.length - 1].value || 0;
          if(lastVal > maxVal) maxVal = lastVal;
        });

        const marker = L.circleMarker([loc.lat, loc.lon], {
          radius: 8,
          color: getMarkerColor(maxVal),
          fillColor: getMarkerColor(maxVal),
          fillOpacity: 0.8
        }).addTo(map).bindPopup(`<b>${loc.name}</b><br>Max Wert: ${maxVal.toFixed(1)}`);

        markers.push({ id: loc.id, marker });
      }
    }

    function highlightLocation(locationId){
      const markerObj = markers.find(m => m.id === locationId);
      if(markerObj){
        markerObj.marker.openPopup();
        map.setView(markerObj.marker.getLatLng(), 12);
        loadMeasurements(locationId); // Ampelliste oben aktualisieren
      }
    }

    initApp();
  </script>
</body>
</html>
